<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ott Store BD</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* AUTH STYLES */
        #auth-screen {
            position: fixed; inset: 0; background: #0b1220;
            display: flex; align-items: center; justify-content: center; z-index: 1000000;
        }
        .login-card {
            background: #111827; padding: 40px; border-radius: 16px;
            width: 340px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #1f2937;
        }
        .login-card input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            border: 1px solid #374151; background: #1f2937; color: white; outline: none;
        }
        .login-card button {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: #e50914; color: white; font-weight: bold; cursor: pointer;
        }
        #status-msg { margin-top: 15px; font-size: 14px; font-weight: 600; min-height: 20px; }

        /* WHATSAPP DIVIDER & BUTTON */
        .divider { margin: 20px 0; border-top: 1px solid #374151; position: relative; }
        .divider span { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            background: #111827; padding: 0 10px; color: #6b7280; font-size: 12px;
        }
        .wa-btn {
            display: block; width: 100%; padding: 12px 20px; background: #25D366;
            color: white; text-decoration: none; border-radius: 8px; font-weight: 600;
            font-size: 14px; transition: 0.3s;
        }
        .wa-btn:hover { background: #1ebd59; transform: translateY(-2px); }

        /* IPTV APP STYLES */
        #app-content { display: none; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:Inter; }
        body { background:#0b1220; color:white; }
        
        .header { 
            padding:15px 18px; background:#111827; position:sticky; top:0; z-index:10; 
            border-bottom: 1px solid #1f2937; display: flex; justify-content: space-between; align-items: center;
        }
        .header-title { font-size:20px; font-weight:700; }
        
        .logout-btn {
            background: #374151; color: white; border: none; padding: 8px 15px;
            border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600;
        }
        .logout-btn:hover { background: #ef4444; }

        .tabs { display:flex; gap:10px; padding:12px; overflow-x:auto; }
        .tab { padding:10px 16px; background:#1f2937; border-radius:999px; white-space:nowrap; cursor:pointer; font-size:14px; }
        .tab.active { background:#e50914; }
        .grid { padding:15px; display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
        .card { background:#111827; border-radius:14px; padding:12px; cursor:pointer; text-align:center; border: 1px solid transparent; }
        .card:hover { transform:scale(1.03); background:#1f2937; border-color: #374151; transition: .2s; }
        .logo { width:65px; height:65px; object-fit:contain; border-radius:12px; margin-bottom:8px; }
        .name { font-weight:600; font-size:14px; }
        
        /* PLAYER */
        .player { position:fixed; inset:0; background:black; display:none; z-index:99999; }
        .player video { width:100%; height:100%; object-fit:contain; }
        .close { position:absolute; top:15px; right:15px; width:40px; height:40px; border:none; border-radius:50%; background:rgba(255,0,0,0.8); color:white; font-size:18px; cursor:pointer; z-index:100000; }
        
        .info-bar { font-size: 10px; padding: 5px 18px; background: #0f172a; color: #64748b; border-bottom: 1px solid #1f2937; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <h2>OTT Tv Premium</h2>
        <input type="text" id="keyInput" placeholder="Enter Access Key">
        <button id="loginBtn">Unlock App</button>
        <p id="status-msg"></p>

        <div class="divider"><span>OR</span></div>
        
        <a href="https://wa.me/8801804728638" target="_blank" class="wa-btn">
            💬 Chat with Admin
        </a>
    </div>
</div>

<div id="app-content">
    <div class="header">
        <div class="header-title">📺 Live TV</div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
    <div class="info-bar">User: <span id="displayUser">...</span> | Plan: <span id="displayPlan">...</span></div>
    <div class="tabs" id="tabs"></div>
    <div id="grid" class="grid"></div>

    <div class="player" id="player">
        <button class="close" id="closeVideo">✕</button>
        <video id="video" controls autoplay playsinline></video>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, get, update, child } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBcEwdYngRGd890oOCHVuB-Sjo9RPrDMzw",
        authDomain: "webzone-1bb3a.firebaseapp.com",
        databaseURL: "https://webzone-1bb3a-default-rtdb.firebaseio.com",
        projectId: "webzone-1bb3a",
        storageBucket: "webzone-1bb3a.firebasestorage.app",
        messagingSenderId: "681482285990",
        appId: "1:681482285990:web:389ef2e0b5ad4327fed567"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const keyInput = document.getElementById("keyInput");
    const msg = document.getElementById("status-msg");

    // SESSION CHECK ON LOAD
    window.addEventListener("DOMContentLoaded", () => {
        const savedKey = localStorage.getItem("iptv_access_key");
        if (savedKey) {
            validateKey(savedKey, true);
        }
    });

    loginBtn.addEventListener("click", () => {
        const key = keyInput.value.trim();
        if (key) validateKey(key, false);
    });

    logoutBtn.addEventListener("click", () => {
        localStorage.removeItem("iptv_access_key");
        location.reload();
    });

    async function validateKey(key, isAutoLogin) {
        if (!isAutoLogin) {
            msg.style.color = "white";
            msg.innerText = "Checking access...";
        }

        try {
            const dbRef = ref(db);
            const snapshot = await get(child(dbRef, `valid_keys/${key}`));

            if (snapshot.exists()) {
                const data = snapshot.val();
                const now = new Date().getTime();
                const days = data.expiryTime;

                if (days === 0) {
                    handleFail("❌ Key Expired.");
                    return;
                }

                let expiry = data.expiresAt;
                if (days !== 9999 && !expiry) {
                    expiry = now + (days * 24 * 60 * 60 * 1000);
                    await update(ref(db, `valid_keys/${key}`), { expiresAt: expiry });
                }

                if (days !== 9999 && now > expiry) {
                    handleFail("❌ Time Ran Out.");
                } else {
                    localStorage.setItem("iptv_access_key", key);
                    grantAccess(data.name, data.packageName);
                }
            } else {
                handleFail("❌ Invalid Key.");
            }
        } catch (e) {
            handleFail("⚠️ Invalid access key.Contact with admin");
        }
    }

    function handleFail(errorText) {
        localStorage.removeItem("iptv_access_key");
        msg.style.color = "#ef4444";
        msg.innerText = errorText;
        document.getElementById("auth-screen").style.display = "flex";
        document.getElementById("app-content").style.display = "none";
    }

    function grantAccess(name, plan) {
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("app-content").style.display = "block";
        document.getElementById("displayUser").innerText = name;
        document.getElementById("displayPlan").innerText = plan;
        initIPTV();
    }

    /* IPTV LOGIC */
    const playlists = [
        {name:'BDTV',url:'https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/BDTv.m3u'},
        {name:'Sports',url:'https://raw.githubusercontent.com/hasanraf/sports/refs/heads/main/sports.m3u'},
        {name:'Entertainment',url:'https://raw.githubusercontent.com/hasanraf/entertainment/refs/heads/main/entertainment.m3u'},
        {name:'Movies',url:'https://raw.githubusercontent.com/hasanraf/Movies/refs/heads/main/movie.m3u'},
        {name:'News',url:'https://raw.githubusercontent.com/hasanraf/News/refs/heads/main/news.m3u'},
        {name:'Wild Life',url:'https://raw.githubusercontent.com/hasanraf/wildlife/refs/heads/main/wild.m3u'}
    ];

    function initIPTV() {
        const tabsBox = document.getElementById("tabs");
        if (tabsBox.children.length > 0) return;

        playlists.forEach((p, i) => {
            const tab = document.createElement("div");
            tab.className = "tab" + (i === 0 ? " active" : "");
            tab.innerText = p.name;
            tab.onclick = () => loadCategory(p.url, tab);
            tabsBox.appendChild(tab);
        });
        loadCategory(playlists[0].url, document.querySelector(".tab"));
    }

    async function loadCategory(url, tab) {
        try {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            const res = await fetch(url);
            const text = await res.text();
            const lines = text.split("\n");
            let channels = [];
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes("#EXTINF")) {
                    const name = lines[i].split(",")[1] || "Channel";
                    const stream = lines[i + 1]?.trim();
                    if (stream && stream.startsWith("http")) {
                        let logoMatch = lines[i].match(/tvg-logo="(.*?)"/);
                        let logo = logoMatch ? logoMatch[1] : "https://via.placeholder.com/70";
                        channels.push({ name, url: stream, logo });
                    }
                }
            }
            renderChannels(channels);
        } catch (err) {
            document.getElementById("grid").innerHTML = `<div class="error">⚠️ Failed to load.</div>`;
        }
    }

    function renderChannels(list) {
        const grid = document.getElementById("grid");
        grid.innerHTML = list.map(ch => `
            <div class="card" onclick="window.playStream('${ch.url}')">
                <img class="logo" src="${ch.logo}" onerror="this.src='https://via.placeholder.com/70'">
                <div class="name">${ch.name}</div>
            </div>
        `).join("");
    }

    let hls;
    window.playStream = function(url) {
        document.getElementById("player").style.display = "block";
        const video = document.getElementById("video");
        if (hls) hls.destroy();
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
    };

    document.getElementById("closeVideo").onclick = function() {
        document.getElementById("player").style.display = "none";
        const video = document.getElementById("video");
        video.pause(); video.src = "";
        if (hls) hls.destroy();
    };
</script>

</body>
</html>
