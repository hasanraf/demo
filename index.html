<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTT Store BD</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- UI COLORS & THEME --- */
        :root { --primary: #e50914; --bg: #0b1220; --card: #111827; --text: #ffffff; --border: #1f2937; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- LOGIN SCREEN --- */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center; z-index: 1000000;
        }
        .login-card {
            background: var(--card); padding: 40px; border-radius: 16px;
            width: 90%; max-width: 360px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border);
        }
        .login-card h2 { margin-bottom: 25px; font-weight: 700; }
        .login-card input {
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px;
            border: 1px solid #374151; background: #1f2937; color: white; outline: none;
        }
        .login-card button {
            width: 100%; padding: 14px; border-radius: 8px; border: none;
            background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .login-card button:hover { opacity: 0.9; transform: scale(0.98); }
        #status-msg { margin-top: 15px; font-size: 13px; font-weight: 600; min-height: 20px; }

        .divider { margin: 25px 0; border-top: 1px solid #374151; position: relative; }
        .divider span { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            background: var(--card); padding: 0 12px; color: #6b7280; font-size: 11px;
        }
        .wa-btn {
            display: block; width: 100%; padding: 12px; background: #25D366;
            color: white; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px;
        }

        /* --- MAIN APP UI --- */
        #app-content { display: none; }
        .header { 
            padding: 15px 20px; background: var(--card); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
        }
        .logout-btn {
            background: #374151; color: white; border: none; padding: 7px 14px;
            border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600;
        }
        .info-bar { font-size: 11px; padding: 8px 20px; background: #0f172a; color: #94a3b8; border-bottom: 1px solid var(--border); }
        .tabs { display: flex; gap: 10px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .tab { padding: 8px 20px; background: var(--border); border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .tab.active { background: var(--primary); font-weight: 600; }

        .grid { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; cursor: pointer; text-align: center; border: 1px solid transparent; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #374151; background: #1f2937; }
        .logo { width: 70px; height: 70px; object-fit: contain; border-radius: 10px; margin-bottom: 10px; background: #000; }
        .name { font-weight: 600; font-size: 13px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- PLAYER --- */
        .player { position: fixed; inset: 0; background: #000; display: none; z-index: 999999; }
        .player video { width: 100%; height: 100%; }
        .close-vid { position: absolute; top: 20px; right: 20px; width: 45px; height: 45px; background: rgba(229, 9, 20, 0.8); border: none; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; z-index: 10; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <h2>🚀 OTT TV Premium</h2>
        <input type="text" id="keyInput" placeholder="Enter Your Access Key">
        <button id="loginBtn">Unlock Experience</button>
        <p id="status-msg"></p>
        <div class="divider"><span>NEED HELP?</span></div>
        <a href="https://wa.me/8801804728638" target="_blank" class="wa-btn">💬 Contact Admin</a>
    </div>
</div>

<div id="app-content">
    <div class="header">
        <div style="font-weight:700; font-size:20px;">📺 LIVE TV</div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
    <div class="info-bar">
        User: <span id="displayUser" style="color:white">...</span> | 
        Plan: <span id="displayPlan" style="color:white">...</span>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="grid" class="grid"></div>

    <div class="player" id="player">
        <button class="close-vid" id="closeVideo">✕</button>
        <video id="video" controls autoplay playsinline></video>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, get, update, child } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDD61OX-aVWgv2jtUXKemTUoBZhvSwefFo",
        authDomain: "access-a3fa3.firebaseapp.com",
        databaseURL: "https://access-a3fa3-default-rtdb.firebaseio.com",
        projectId: "access-a3fa3",
        storageBucket: "access-a3fa3.firebasestorage.app",
        messagingSenderId: "1044711265002",
        appId: "1:1044711265002:web:cccf942c45cf5457343d93"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);

    // 1. SESSION PERSISTENCE
    window.addEventListener("DOMContentLoaded", () => {
        const savedKey = localStorage.getItem("iptv_access_key");
        if (savedKey) validateKey(savedKey, true);
    });

    document.getElementById("loginBtn").onclick = () => {
        const key = document.getElementById("keyInput").value.trim();
        if (key) validateKey(key, false);
    };

    document.getElementById("logoutBtn").onclick = () => {
        localStorage.removeItem("ott_tv_access_key");
        location.reload();
    };

    // 2. VALIDATION LOGIC
    async function validateKey(key, isAuto) {
        const msg = document.getElementById("status-msg");
        if (!isAuto) msg.innerText = "Verifying Key...";

        try {
            const snapshot = await get(child(ref(db), `valid_keys/${key}`));
            if (snapshot.exists()) {
                const data = snapshot.val();
                const now = new Date().getTime();
                const daysLimit = data.expire; // Matches your JSON 'expire' label

                if (daysLimit === 0) return handleFail("❌ Your Key has benn Expired.Contact with admin");

                let expiryDate = data.expiresAt;
                // If it's a new key, calculate and save expiry time
                if (daysLimit !== 9999 && !expiryDate) {
                    expiryDate = now + (daysLimit * 24 * 60 * 60 * 1000);
                    await update(ref(db, `valid_keys/${key}`), { expiresAt: expiryDate });
                }

                if (daysLimit !== 9999 && now > expiryDate) {
                    handleFail("❌ Access Expired.");
                } else {
                    localStorage.setItem("iptv_access_key", key);
                    showApp(data.name, data.package); // Matches your JSON 'package' label
                }
            } else { handleFail("❌ Invalid Access token.Contact with admin"); }
        } catch (e) { 
            console.error(e);
            handleFail("⚠️ Database Error. Check Rules."); 
        }
    }

    function handleFail(txt) {
        localStorage.removeItem("iptv_access_key");
        const msg = document.getElementById("status-msg");
        msg.style.color = "#ef4444";
        msg.innerText = txt;
        document.getElementById("auth-screen").style.display = "flex";
        document.getElementById("app-content").style.display = "none";
    }

    function showApp(name, plan) {
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("app-content").style.display = "block";
        document.getElementById("displayUser").innerText = name;
        document.getElementById("displayPlan").innerText = plan;
        initIPTV();
    }

    // 3. IPTV CONTENT LOADING
    const playlists = [
        {name:'BDTV',url:'https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/BDTv.m3u'},
        {name:'Sports',url:'https://raw.githubusercontent.com/hasanraf/sports/refs/heads/main/sports.m3u'},
        {name:'Entertainment',url:'https://raw.githubusercontent.com/hasanraf/entertainment/refs/heads/main/entertainment.m3u'},
        {name:'Movies',url:'https://raw.githubusercontent.com/hasanraf/Movies/refs/heads/main/movie.m3u'},
        {name:'News',url:'https://raw.githubusercontent.com/hasanraf/News/refs/heads/main/news.m3u'},
        {name:'Wild Life',url:'https://raw.githubusercontent.com/hasanraf/wildlife/refs/heads/main/wild.m3u'}
    ];

    function initIPTV() {
        const tabsBox = document.getElementById("tabs");
        if (tabsBox.children.length > 0) return;
        playlists.forEach((p, i) => {
            const t = document.createElement("div");
            t.className = "tab" + (i === 0 ? " active" : "");
            t.innerText = p.name;
            t.onclick = () => loadCategory(p.url, t);
            tabsBox.appendChild(t);
        });
        loadCategory(playlists[0].url, tabsBox.firstChild);
    }

    async function loadCategory(url, tab) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        try {
            const res = await fetch(url);
            const text = await res.text();
            const channels = [];
            text.split("\n").forEach((line, i, arr) => {
                if (line.includes("#EXTINF")) {
                    const stream = arr[i+1]?.trim();
                    if (stream?.startsWith("http")) {
                        const name = line.split(",")[1] || "Channel";
                        const logo = line.match(/tvg-logo="(.*?)"/)?.[1] || "https://via.placeholder.com/100";
                        channels.push({ name, url: stream, logo });
                    }
                }
            });
            renderGrid(channels);
        } catch (e) { console.error("M3U Load Error"); }
    }

    function renderGrid(list) {
        document.getElementById("grid").innerHTML = list.map(ch => `
            <div class="card" onclick="window.playStream('${ch.url}')">
                <img class="logo" src="${ch.logo}" onerror="this.src='https://via.placeholder.com/100'">
                <div class="name">${ch.name}</div>
            </div>
        `).join("");
    }

    let hls;
    window.playStream = (url) => {
        document.getElementById("player").style.display = "block";
        const v = document.getElementById("video");
        if (hls) hls.destroy();
        if (Hls.isSupported()) {
            hls = new Hls(); hls.loadSource(url); hls.attachMedia(v);
            hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
        } else { v.src = url; v.play(); }
    };

    document.getElementById("closeVideo").onclick = () => {
        document.getElementById("player").style.display = "none";
        document.getElementById("video").pause();
        if (hls) hls.destroy();
    };
</script>
</body>
</html>
