<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTT Store BD</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --bg: #0b1220; --card: #111827; --text: #ffffff; --border: #1f2937; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: var(--card); padding: 30px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; border: 1px solid var(--border); }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: 1px solid #374151; background: #1f2937; color: white; outline: none; }
        button#loginBtn { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 6px; color: white; font-weight: 700; cursor: pointer; }
        #status-msg { margin-top: 15px; font-size: 13px; color: #ef4444; font-weight: 600; }
        #app-content { display: none; }
        .header { padding: 15px 20px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .info-bar { padding: 12px 20px; background: #0f172a; font-size: 11px; color: #94a3b8; border-bottom: 1px solid var(--border); line-height: 1.6; }
        .info-bar b { color: #fff; }
        .logout-btn { background: #374151; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .tabs { display: flex; gap: 10px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .tab { padding: 8px 16px; background: var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .tab.active { background: var(--primary); font-weight: 600; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: var(--card); padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid transparent; }
        .card:hover { border-color: #374151; transform: translateY(-3px); }
        .card img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 8px; border-radius: 5px; }
        .player { position: fixed; inset: 0; background: #000; display: none; z-index: 2000; }
        video { width: 100%; height: 100%; }
        .close-vid { position: absolute; top: 20px; right: 20px; background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; z-index: 2100; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <h2 style="letter-spacing: 1px;">OTT PREMIUM</h2>
        <input type="text" id="keyInput" placeholder="Enter Access Key">
        <button id="loginBtn">ACTIVATE</button>
        <p id="status-msg"></p>
    </div>
</div>

<div id="app-content">
    <div class="header">
        <div style="font-weight:700; color: var(--primary);">OTT STORE BD</div>
        <button class="logout-btn" id="logoutBtn">LOGOUT</button>
    </div>
    <div class="info-bar">
        USER: <b id="displayUser"></b> | PLAN: <b id="displayPlan"></b><br>
        JOINED: <b id="displayStart"></b> | EXPIRES: <b id="displayEnd" style="color:#25D366"></b>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="grid" class="grid"></div>
    <div class="player" id="player">
        <button class="close-vid" id="closeVideo">✕</button>
        <video id="video" controls autoplay playsinline></video>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, get, update, child } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDD61OX-aVWgv2jtUXKemTUoBZhvSwefFo",
        authDomain: "access-a3fa3.firebaseapp.com",
        databaseURL: "https://access-a3fa3-default-rtdb.firebaseio.com",
        projectId: "access-a3fa3",
        storageBucket: "access-a3fa3.firebasestorage.app",
        messagingSenderId: "1044711265002",
        appId: "1:1044711265002:web:cccf942c45cf5457343d93"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);
    const STORAGE_KEY = "ott_session_v2";

    function formatDate(ts) {
        if (!ts) return "Lifetime";
        return new Date(ts).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    window.onload = () => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) validate(saved, true);
    };

    document.getElementById("loginBtn").onclick = () => {
        const val = document.getElementById("keyInput").value.trim();
        if (val) validate(val, false);
    };

    document.getElementById("logoutBtn").onclick = () => {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
    };

    async function validate(key, isAuto) {
        const msg = document.getElementById("status-msg");
        if (!isAuto) msg.innerText = "Verifying Key...";
        
        try {
            const snap = await get(child(ref(db), `valid_keys/${key}`));
            if (snap.exists()) {
                const data = snap.val();
                const now = new Date().getTime();
                
                let start = data.subscribedAt;
                let end = data.expiresAt;

                // 1. Handle auto-generation for new keys
                if (!start && data.expire > 0) {
                    start = now;
                    end = (data.expire === 9999) ? null : now + (data.expire * 24 * 60 * 60 * 1000);
                    await update(ref(db, `valid_keys/${key}`), { subscribedAt: start, expiresAt: end });
                }

                // 2. Expiry Check
                if (end && now > end) {
                    return fail("❌ Access Expired");
                }

                localStorage.setItem(STORAGE_KEY, key);
                showApp(data.name, (data.package || data.Package || "Standard"), start, end);
            } else {
                fail("❌ Invalid Key");
            }
        } catch (e) {
            fail("⚠️ Server Connection Error");
        }
    }

    function fail(t) {
        localStorage.removeItem(STORAGE_KEY);
        document.getElementById("status-msg").innerText = t;
        document.getElementById("auth-screen").style.display = "flex";
        document.getElementById("app-content").style.display = "none";
    }

    function showApp(u, p, s, e) {
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("app-content").style.display = "block";
        document.getElementById("displayUser").innerText = u;
        document.getElementById("displayPlan").innerText = p;
        document.getElementById("displayStart").innerText = formatDate(s);
        document.getElementById("displayEnd").innerText = formatDate(e);
        loadPlaylists();
    }

    const sources = [
        {name:'BDTV',url:'https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/BDTv.m3u'},
        {name:'Sports',url:'https://raw.githubusercontent.com/hasanraf/sports/refs/heads/main/sports.m3u'},
        {name:'Movies',url:'https://raw.githubusercontent.com/hasanraf/Movies/refs/heads/main/movie.m3u'}
    ];

    function loadPlaylists() {
        const box = document.getElementById("tabs");
        if (box.children.length > 0) return;
        sources.forEach((s, i) => {
            const btn = document.createElement("div");
            btn.className = "tab" + (i===0?" active":"");
            btn.innerText = s.name;
            btn.onclick = () => fetchM3U(s.url, btn);
            box.appendChild(btn);
        });
        fetchM3U(sources[0].url, box.firstChild);
    }

    async function fetchM3U(url, el) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        el.classList.add("active");
        try {
            const res = await fetch(url);
            const text = await res.text();
            const chs = [];
            text.split("\n").forEach((l, i, a) => {
                if (l.includes("#EXTINF")) {
                    const link = a[i+1]?.trim();
                    if (link?.startsWith("http")) {
                        const name = l.split(",")[1] || "Channel";
                        const logo = l.match(/tvg-logo="(.*?)"/)?.[1] || "";
                        chs.push({ name, url: link, logo });
                    }
                }
            });
            document.getElementById("grid").innerHTML = chs.map(c => `
                <div class="card" onclick="play('${c.url}')">
                    <img src="${c.logo}" onerror="this.src='https://via.placeholder.com/60?text=TV'">
                    <div style="font-size:11px; font-weight:600; color:#cbd5e1">${c.name}</div>
                </div>
            `).join("");
        } catch(e) { console.error("M3U Load Error"); }
    }

    let hls;
    window.play = (url) => {
        const v = document.getElementById("video");
        document.getElementById("player").style.display = "block";
        if (hls) hls.destroy();
        if (Hls.isSupported()) {
            hls = new Hls(); hls.loadSource(url); hls.attachMedia(v);
            hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
        } else { v.src = url; v.play(); }
    };

    document.getElementById("closeVideo").onclick = () => {
        document.getElementById("player").style.display = "none";
        document.getElementById("video").pause();
        if (hls) hls.destroy();
    };
</script>
</body>
</html>
