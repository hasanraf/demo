<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ott store bd</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- AUTH & LOGIN STYLES --- */
        #auth-screen {
            position: fixed; inset: 0; background: #0b1220;
            display: flex; align-items: center; justify-content: center; z-index: 1000000;
        }
        .login-card {
            background: #111827; padding: 40px; border-radius: 16px;
            width: 340px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #1f2937;
        }
        .login-card h2 { margin-bottom: 20px; color: #fff; }
        .login-card input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            border: 1px solid #374151; background: #1f2937; color: white; outline: none;
        }
        .login-card button {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: #e50914; color: white; font-weight: bold; cursor: pointer;
        }
        #status-msg { margin-top: 15px; font-size: 13px; font-weight: 600; min-height: 20px; }

        .divider { margin: 20px 0; border-top: 1px solid #374151; position: relative; }
        .divider span { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            background: #111827; padding: 0 10px; color: #6b7280; font-size: 11px;
        }
        .wa-btn {
            display: block; width: 100%; padding: 12px 20px; background: #25D366;
            color: white; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px;
        }

        /* --- IPTV APP STYLES --- */
        #app-content { display: none; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:Inter; }
        body { background:#0b1220; color:white; }
        
        .header { 
            padding:12px 18px; background:#111827; position:sticky; top:0; z-index:10; 
            border-bottom: 1px solid #1f2937; display: flex; justify-content: space-between; align-items: center;
        }
        .header-title { font-size:18px; font-weight:700; }
        
        .logout-btn {
            background: #374151; color: white; border: none; padding: 6px 12px;
            border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: 600;
        }
        .logout-btn:hover { background: #ef4444; }

        .info-bar { font-size: 10px; padding: 6px 18px; background: #0f172a; color: #64748b; border-bottom: 1px solid #1f2937; }

        .tabs { display:flex; gap:10px; padding:12px; overflow-x:auto; scrollbar-width: none; }
        .tab { padding:8px 16px; background:#1f2937; border-radius:999px; white-space:nowrap; cursor:pointer; font-size:13px; }
        .tab.active { background:#e50914; }

        .grid { padding:15px; display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
        .card { background:#111827; border-radius:14px; padding:12px; cursor:pointer; text-align:center; border: 1px solid transparent; transition: .2s; }
        .card:hover { transform:scale(1.03); background:#1f2937; border-color: #374151; }
        .logo { width:60px; height:60px; object-fit:contain; border-radius:10px; margin-bottom:8px; }
        .name { font-weight:600; font-size:13px; }
        .cat-tag { font-size: 10px; color: #6b7280; margin-top: 4px; }
        
        /* --- PLAYER --- */
        .player { position:fixed; inset:0; background:black; display:none; z-index:99999; }
        .player video { width:100%; height:100%; object-fit:contain; }
        .close { position:absolute; top:15px; right:15px; width:40px; height:40px; border:none; border-radius:50%; background:rgba(255,0,0,0.8); color:white; font-size:18px; cursor:pointer; z-index:100000; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <h2>🚀 TV Login</h2>
        <input type="text" id="keyInput" placeholder="Enter Access Key">
        <button id="loginBtn">Unlock App</button>
        <p id="status-msg"></p>
        <div class="divider"><span>OR</span></div>
        <a href="https://wa.me/8801804728638" target="_blank" class="wa-btn">💬 Chat with Admin</a>
    </div>
</div>

<div id="app-content">
    <div class="header">
        <div class="header-title">📺 Live TV</div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
    <div class="info-bar">User: <span id="displayUser">...</span> | Plan: <span id="displayPlan">...</span></div>
    <div class="tabs" id="tabs"></div>
    <div id="grid" class="grid"></div>

    <div class="player" id="player">
        <button class="close" id="closeVideo">✕</button>
        <video id="video" controls autoplay playsinline></video>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, get, update, child } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDD61OX-aVWgv2jtUXKemTUoBZhvSwefFo",
        authDomain: "access-a3fa3.firebaseapp.com",
        databaseURL: "https://access-a3fa3-default-rtdb.firebaseio.com",
        projectId: "access-a3fa3",
        storageBucket: "access-a3fa3.firebasestorage.app",
        messagingSenderId: "1044711265002",
        appId: "1:1044711265002:web:cccf942c45cf5457343d93",
        measurementId: "G-FZ64DYC0CL"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);

    // SESSION HANDLING
    window.addEventListener("DOMContentLoaded", () => {
        const savedKey = localStorage.getItem("iptv_access_key");
        if (savedKey) validateKey(savedKey, true);
    });

    document.getElementById("loginBtn").onclick = () => {
        const key = document.getElementById("keyInput").value.trim();
        if (key) validateKey(key, false);
    };

    document.getElementById("logoutBtn").onclick = () => {
        localStorage.removeItem("iptv_access_key");
        location.reload();
    };

    async function validateKey(key, isAuto) {
        const msg = document.getElementById("status-msg");
        if (!isAuto) msg.innerText = "Verifying...";

        try {
            const snapshot = await get(child(ref(db), `valid_keys/${key}`));
            if (snapshot.exists()) {
                const data = snapshot.val();
                const now = new Date().getTime();
                
                if (data.expiryTime === 0) return handleFail("❌ Key Expired.");

                let expiry = data.expiresAt;
                if (data.expiryTime !== 9999 && !expiry) {
                    expiry = now + (data.expiryTime * 24 * 60 * 60 * 1000);
                    await update(ref(db, `valid_keys/${key}`), { expiresAt: expiry });
                }

                if (data.expiryTime !== 9999 && now > expiry) {
                    handleFail("❌ Access Expired.");
                } else {
                    localStorage.setItem("iptv_access_key", key);
                    showApp(data.name, data.packageName);
                }
            } else { handleFail("❌ Invalid Key."); }
        } catch (e) { handleFail("⚠️ Error: Check Connection."); }
    }

    function handleFail(txt) {
        localStorage.removeItem("iptv_access_key");
        const msg = document.getElementById("status-msg");
        msg.style.color = "#ef4444";
        msg.innerText = txt;
        document.getElementById("auth-screen").style.display = "flex";
        document.getElementById("app-content").style.display = "none";
    }

    function showApp(name, plan) {
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("app-content").style.display = "block";
        document.getElementById("displayUser").innerText = name;
        document.getElementById("displayPlan").innerText = plan;
        initIPTV();
    }

    /* --- IPTV CONTENT LOGIC --- */
    const playlists = [
        {name:'BDTV',url:'https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/BDTv.m3u'},
        {name:'Sports',url:'https://raw.githubusercontent.com/hasanraf/sports/refs/heads/main/sports.m3u'},
        {name:'Entertainment',url:'https://raw.githubusercontent.com/hasanraf/entertainment/refs/heads/main/entertainment.m3u'},
        {name:'Movies',url:'https://raw.githubusercontent.com/hasanraf/Movies/refs/heads/main/movie.m3u'},
        {name:'News',url:'https://raw.githubusercontent.com/hasanraf/News/refs/heads/main/news.m3u'},
        {name:'Wild Life',url:'https://raw.githubusercontent.com/hasanraf/wildlife/refs/heads/main/wild.m3u'}
    ];

    function initIPTV() {
        const tabsBox = document.getElementById("tabs");
        if (tabsBox.children.length > 0) return;
        playlists.forEach((p, i) => {
            const t = document.createElement("div");
            t.className = "tab" + (i === 0 ? " active" : "");
            t.innerText = p.name;
            t.onclick = () => loadCategory(p.url, t);
            tabsBox.appendChild(t);
        });
        loadCategory(playlists[0].url, tabsBox.firstChild);
    }

    async function loadCategory(url, tab) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        try {
            const res = await fetch(url);
            const text = await res.text();
            const channels = [];
            text.split("\n").forEach((line, i, arr) => {
                if (line.includes("#EXTINF")) {
                    const stream = arr[i+1]?.trim();
                    if (stream?.startsWith("http")) {
                        const name = line.split(",")[1] || "Channel";
                        const logo = line.match(/tvg-logo="(.*?)"/)?.[1] || "https://via.placeholder.com/60";
                        channels.push({ name, url: stream, logo, cat: tab.innerText });
                    }
                }
            });
            render(channels);
        } catch (e) { console.error("Load error"); }
    }

    function render(list) {
        document.getElementById("grid").innerHTML = list.map(ch => `
            <div class="card" onclick="window.playStream('${ch.url}')">
                <img class="logo" src="${ch.logo}" onerror="this.src='https://via.placeholder.com/60'">
                <div class="name">${ch.name}</div>
                <div class="cat-tag">${ch.cat}</div>
            </div>
        `).join("");
    }

    let hls;
    window.playStream = (url) => {
        document.getElementById("player").style.display = "block";
        const v = document.getElementById("video");
        if (hls) hls.destroy();
        if (Hls.isSupported()) {
            hls = new Hls(); hls.loadSource(url); hls.attachMedia(v);
            hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
        } else { v.src = url; v.play(); }
    };

    document.getElementById("closeVideo").onclick = () => {
        document.getElementById("player").style.display = "none";
        document.getElementById("video").pause();
        if (hls) hls.destroy();
    };
</script>

</body>
</html>
